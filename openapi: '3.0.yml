openapi: '3.0.3'
info:
  title: StorySparkServer
  x-summary: AI-powered image processing and story generation API
  version: '1.0'
  description: |
    The StorySparkServer API enables users to upload images and text descriptions,
    process them through AI algorithms, and generate creative stories and processed
    images. This API provides a comprehensive workflow for image and text management.
  termsOfService: 'https://api.server.test/terms-of-service'
  contact:
    name: StorySparkServer Support
    url: 'https://api.server.test/support'
    email: support@storyspark.test
  license:
    name: Apache 2.0
    url: 'http://www.apache.org/licenses/LICENSE-2.0.html'
  x-api-id: 5f8c3a9e-2b1d-4e7f-9a6c-3d2e1f8a7b4c
  x-audience: |
    This API is intended for client applications that need to process images
    and generate story content. Target audiences include web applications,
    mobile clients, and third-party integrations.
servers:
  - url: https://api.server.test/v1
paths:
  /test:
    get:
      summary: Test endpoint
      description: Health check endpoint to verify API availability.
      responses:
        '200':
          description: API is operational
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/X-RateLimit-Limit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/X-RateLimit-Remaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/X-RateLimit-Reset'
  /upload-images:
    post:
      summary: Upload a list of images
      description: Accepts multiple images from the client and processes them on the server.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                images:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: List of image files to upload
      responses:
        '200':
          description: Images uploaded successfully
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/X-RateLimit-Limit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/X-RateLimit-Remaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/X-RateLimit-Reset'
        '400':
          $ref: '#/components/responses/BadRequest'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      summary: Abort image upload
      description: Aborts an ongoing image upload process.
      responses:
        '200':
          description: Upload aborted successfully
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/X-RateLimit-Limit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/X-RateLimit-Remaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/X-RateLimit-Reset'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /upload-descriptions:
    post:
      summary: Upload a list of text descriptions
      description: Accepts a list of text packages that describe the images to be uploaded.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                descriptions:
                  type: array
                  items:
                    type: string
                  description: List of text descriptions for the images
              required:
                - descriptions
      responses:
        '200':
          description: Descriptions uploaded successfully
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/X-RateLimit-Limit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/X-RateLimit-Remaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/X-RateLimit-Reset'
        '400':
          $ref: '#/components/responses/BadRequest'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /upload-titles:
    post:
      summary: Upload a list of image titles
      description: Accepts a list of text titles for the images to be uploaded.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                titles:
                  type: array
                  items:
                    type: string
                  description: List of text titles for the images
              required:
                - titles
      responses:
        '200':
          description: Titles uploaded successfully
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/X-RateLimit-Limit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/X-RateLimit-Remaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/X-RateLimit-Reset'
        '400':
          $ref: '#/components/responses/BadRequest'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /process-images:
    post:
      summary: Start processing of uploaded images
      description: Initiates the processing of the previously uploaded images.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                options:
                  type: object
                  description: Optional processing options
      responses:
        '202':
          description: Processing started
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/X-RateLimit-Limit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/X-RateLimit-Remaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/X-RateLimit-Reset'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/TooManyRequests'
    get:
      summary: Get processing progress
      description: Retrieves the current status and progress of the image processing.
      responses:
        '200':
          description: Processing status
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/X-RateLimit-Limit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/X-RateLimit-Remaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/X-RateLimit-Reset'
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [pending, processing, completed, failed]
                  progress:
                    type: integer
                    minimum: 0
                    maximum: 100
                    description: Progress percentage
                  message:
                    type: string
                    description: Optional status message
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
    delete:
      summary: Abort image processing
      description: Aborts the ongoing image processing.
      responses:
        '200':
          description: Processing aborted successfully
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/X-RateLimit-Limit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/X-RateLimit-Remaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/X-RateLimit-Reset'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /processing-result:
    get:
      summary: Retrieve processing result
      description: Retrieves the result of the completed image processing, including generated text and processed images.
      responses:
        '200':
          description: Processing result retrieved successfully
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/X-RateLimit-Limit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/X-RateLimit-Remaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/X-RateLimit-Reset'
          content:
            application/json:
              schema:
                type: object
                properties:
                  text:
                    type: string
                    description: Generated text from processing
                  images:
                    type: array
                    items:
                      type: string
                      format: uri
                      description: URLs to processed images
                required:
                  - text
                  - images
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
components:
  schemas:
    Problem:
      type: object
      description: RFC 7807 Problem Details for HTTP APIs
      properties:
        type:
          type: string
          format: uri
          description: A URI reference that identifies the problem type
          default: 'about:blank'
        title:
          type: string
          description: A short, human-readable summary of the problem type
        status:
          type: integer
          format: int32
          description: The HTTP status code generated by the API
          minimum: 100
          maximum: 599
        detail:
          type: string
          description: A human-readable explanation specific to this occurrence of the problem
        instance:
          type: string
          format: uri
          description: A URI reference that identifies the specific occurrence of the problem
      required:
        - status
  headers:
    X-RateLimit-Limit:
      description: The maximum number of requests allowed in the current time window
      schema:
        type: integer
      example: 100
    X-RateLimit-Remaining:
      description: The number of requests remaining in the current time window
      schema:
        type: integer
      example: 75
    X-RateLimit-Reset:
      description: The Unix timestamp when the rate limit window resets
      schema:
        type: integer
      example: 1619827200
    Retry-After:
      description: Indicates how long to wait before making a follow-up request
      schema:
        type: integer
      example: 3600
  responses:
    BadRequest:
      description: Bad request - The request was invalid or malformed
      headers:
        X-RateLimit-Limit:
          $ref: '#/components/headers/X-RateLimit-Limit'
        X-RateLimit-Remaining:
          $ref: '#/components/headers/X-RateLimit-Remaining'
        X-RateLimit-Reset:
          $ref: '#/components/headers/X-RateLimit-Reset'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
          example:
            status: 400
            title: Bad Request
            detail: The request body contains invalid data
    NotFound:
      description: Not found - The requested resource does not exist
      headers:
        X-RateLimit-Limit:
          $ref: '#/components/headers/X-RateLimit-Limit'
        X-RateLimit-Remaining:
          $ref: '#/components/headers/X-RateLimit-Remaining'
        X-RateLimit-Reset:
          $ref: '#/components/headers/X-RateLimit-Reset'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
          example:
            status: 404
            title: Not Found
            detail: The requested resource was not found
    Conflict:
      description: Conflict - The request conflicts with the current state of the server
      headers:
        X-RateLimit-Limit:
          $ref: '#/components/headers/X-RateLimit-Limit'
        X-RateLimit-Remaining:
          $ref: '#/components/headers/X-RateLimit-Remaining'
        X-RateLimit-Reset:
          $ref: '#/components/headers/X-RateLimit-Reset'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
          example:
            status: 409
            title: Conflict
            detail: Processing is already in progress
    TooManyRequests:
      description: Too many requests - Rate limit exceeded
      headers:
        X-RateLimit-Limit:
          $ref: '#/components/headers/X-RateLimit-Limit'
        X-RateLimit-Remaining:
          $ref: '#/components/headers/X-RateLimit-Remaining'
        X-RateLimit-Reset:
          $ref: '#/components/headers/X-RateLimit-Reset'
        Retry-After:
          $ref: '#/components/headers/Retry-After'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
          example:
            status: 429
            title: Too Many Requests
            detail: Rate limit exceeded. Please retry after the Retry-After header
    InternalServerError:
      description: Internal server error - An unexpected error occurred on the server
      headers:
        X-RateLimit-Limit:
          $ref: '#/components/headers/X-RateLimit-Limit'
        X-RateLimit-Remaining:
          $ref: '#/components/headers/X-RateLimit-Remaining'
        X-RateLimit-Reset:
          $ref: '#/components/headers/X-RateLimit-Reset'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
          example:
            status: 500
            title: Internal Server Error
            detail: An unexpected error occurred while processing your request
